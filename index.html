<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestione Prospect Sport - Medical Group</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--verde:#9DBF60;--grigio:#77797a;--grigio-chiaro:#aaaaaa;--navy:#4A4C4D;--blue-light:#D5E3B7;--blue-xlight:#EEF5E3;--red:#C0392B;--red-light:#FDECEA;--orange:#E67E22;--orange-light:#FEF0E3;--purple:#8E44AD;--purple-light:#F4EAF9;--g50:#F8F9F8;--g100:#F0F2EE;--g200:#E2E6DF;--g300:#C8CEC4;--g500:#77797a;--g700:#4A4C4D;--g900:#2A2C2D;--sh-sm:0 1px 3px rgba(74,76,77,.08),0 1px 2px rgba(74,76,77,.05);--sh-md:0 4px 12px rgba(74,76,77,.10);--sh-lg:0 12px 32px rgba(74,76,77,.14),0 4px 10px rgba(74,76,77,.07);--r:10px;--rsm:6px;--rlg:16px;font-family:'Raleway',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--g50);color:var(--g900);font-family:'Raleway',sans-serif;font-size:14px;}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:380px;}
#toast.show{opacity:1;transform:translateY(0);}#toast.tok{background:var(--g900);color:#fff;}#toast.terr{background:var(--red);color:#fff;}#toast.twarn{background:var(--orange);color:#fff;}
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--g50);}
.lcard{background:#fff;border-radius:var(--rlg);padding:40px 38px;width:100%;max-width:420px;box-shadow:var(--sh-lg);border:1px solid var(--g200);}
.lcard h2{font-size:22px;font-weight:700;color:var(--navy);margin:20px 0 6px;}.lcard p{font-size:13px;color:var(--g500);margin-bottom:24px;}
.lfield{margin-bottom:16px;}.lfield label{display:block;font-size:12px;font-weight:600;color:var(--g700);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.lfield input{width:100%;padding:11px 14px;border:1px solid var(--g200);border-radius:var(--rsm);background:#EEF5E3;font-family:'Raleway',sans-serif;font-size:14px;color:var(--g900);outline:none;transition:border-color .2s;}
.lfield input:focus{border-color:var(--verde);}
.lbtn{width:100%;padding:12px;background:var(--verde);color:#fff;border:none;border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s;}
.lbtn:hover{opacity:.88;}.lerr{background:var(--red-light);color:var(--red);border-radius:var(--rsm);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
#app{display:flex;flex-direction:column;min-height:100vh;display:none;}
#topbar{background:#fff;border-bottom:1px solid var(--g200);padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm);}
#tb-top{height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g100);}
#tb-right{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--g500);}
#tb-user{font-weight:600;color:var(--navy);}#tb-role{background:var(--blue-xlight);color:var(--verde);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
#lout{background:none;border:1px solid var(--g200);border-radius:var(--rsm);padding:5px 12px;font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;transition:all .2s;}
#lout:hover{border-color:var(--red);color:var(--red);}
#tb-nav{height:40px;display:flex;align-items:stretch;overflow-x:auto;}
.tnb{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:12px;font-weight:600;color:var(--g500);cursor:pointer;border:none;background:none;font-family:'Raleway',sans-serif;letter-spacing:.3px;border-bottom:2.5px solid transparent;transition:all .17s;text-transform:uppercase;white-space:nowrap;}
.tnb:hover{color:var(--g700);border-bottom-color:var(--g300);}.tnb.active{color:var(--verde);border-bottom-color:var(--verde);}
.tnb .badge{background:var(--verde);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:800;}
#campagna-bar{background:var(--blue-xlight);border-bottom:1px solid var(--blue-light);padding:6px 28px;display:flex;align-items:center;gap:12px;font-size:12px;}
#campagna-bar label{font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.4px;font-size:11px;}
#campagna-sel{padding:4px 10px;border:1px solid var(--blue-light);border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:12px;font-weight:600;background:#fff;color:var(--navy);cursor:pointer;outline:none;}
#campagna-badge{font-size:11px;color:var(--g500);}
main#main{flex:1;padding:28px;max-width:1400px;margin:0 auto;width:100%;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:800;color:var(--navy);}.page-subtitle{font-size:13px;color:var(--g500);margin-top:2px;}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);box-shadow:var(--sh-sm);padding:20px;}
.card-title{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm);}
.stat-val{font-size:26px;font-weight:800;color:var(--navy);}.stat-lbl{font-size:11px;color:var(--g500);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}.stat-sub{font-size:11px;color:var(--verde);font-weight:600;margin-top:4px;}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--verde);color:#fff;}.btn-primary:hover{opacity:.88;}.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-secondary{background:#fff;color:var(--g700);border:1px solid var(--g200);}.btn-secondary:hover{border-color:var(--g300);background:var(--g50);}
.btn-danger{background:var(--red);color:#fff;}.btn-danger:hover{opacity:.88;}
.btn-sm{padding:5px 11px;font-size:11.5px;}.btn-orange{background:var(--orange);color:#fff;}.btn-orange:hover{opacity:.88;}
input[type=text],input[type=email],input[type=number],select,textarea{padding:8px 12px;border:1px solid var(--g200);border-radius:var(--rsm);font-family:'Raleway',sans-serif;font-size:13px;color:var(--g900);background:#fff;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--verde);}select{cursor:pointer;}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--g200);}
table{width:100%;border-collapse:collapse;background:#fff;}
thead th{background:var(--g100);padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--g200);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--g100);transition:background .15s;}tbody tr:last-child{border-bottom:none;}tbody tr:hover{background:var(--g50);}
tbody td{padding:10px 14px;font-size:13px;color:var(--g700);vertical-align:middle;}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--verde);cursor:pointer;}
.badge-stato{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.s-nuovo{background:#EEF5E3;color:#5a8a2e;}.s-email_trovata{background:#E3F0FF;color:#1a5fa8;}.s-contattato{background:var(--orange-light);color:#b05a0a;}.s-risposto{background:var(--purple-light);color:#6a2d8a;}.s-call{background:#E3FFF0;color:#1a7a4a;}.s-cliente{background:#EEF5E3;color:#2e6e1a;}.s-no{background:var(--red-light);color:var(--red);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}.dot-nuovo{background:#9DBF60;}.dot-email_trovata{background:#3a7fd4;}.dot-contattato{background:var(--orange);}.dot-risposto{background:var(--purple);}.dot-call{background:#2e9e6a;}.dot-cliente{background:#3a9e1a;}.dot-no{background:var(--red);}
.sel-bar{background:var(--blue-xlight);border:1px solid var(--blue-light);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.sel-bar.visible{display:flex;}.sel-info{font-size:13px;font-weight:600;color:var(--navy);}
#modal-overlay{position:fixed;inset:0;background:rgba(74,76,77,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--rlg);box-shadow:var(--sh-lg);width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;}
.modal-lg{max-width:860px;}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-head h3{font-size:16px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;font-size:20px;color:var(--g500);cursor:pointer;padding:2px 6px;border-radius:4px;}
.modal-close:hover{background:var(--g100);}
.modal-body{padding:24px;overflow-y:auto;flex:1;}.modal-foot{padding:16px 24px;border-top:1px solid var(--g200);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}.frow.full{grid-template-columns:1fr;}.frow.three{grid-template-columns:1fr 1fr 1fr;}
.fgroup{display:flex;flex-direction:column;gap:5px;}.fgroup label{font-size:12px;font-weight:700;color:var(--g700);text-transform:uppercase;letter-spacing:.4px;}
.fgroup input,.fgroup select,.fgroup textarea{width:100%;}.fgroup textarea{resize:vertical;min-height:90px;line-height:1.5;}
.email-meta{background:var(--blue-xlight);border-radius:var(--rsm);padding:10px 14px;margin-bottom:12px;font-size:12px;}
.kanban-wrap{overflow-x:auto;padding-bottom:8px;}.kanban{display:flex;gap:14px;min-width:max-content;}
.kan-col{background:var(--g100);border-radius:var(--r);padding:14px;width:190px;flex-shrink:0;}
.kan-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.kan-head .cnt{background:var(--g300);color:var(--g700);border-radius:20px;padding:1px 8px;font-size:11px;font-weight:800;}
.kan-card{background:#fff;border:1px solid var(--g200);border-radius:var(--rsm);padding:10px 12px;margin-bottom:8px;box-shadow:var(--sh-sm);cursor:pointer;transition:all .2s;}
.kan-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.kan-card .kc-nome{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:3px;line-height:1.3;}.kan-card .kc-sub{font-size:11px;color:var(--g500);}
.log-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--g100);}.log-item:last-child{border-bottom:none;}
.log-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.log-icon.search{background:var(--blue-xlight);}.log-icon.email{background:#EEF5E3;}.log-icon.hunter{background:var(--orange-light);}.log-icon.system{background:var(--g100);}
.log-azione{font-size:13px;font-weight:600;color:var(--navy);}.log-dettaglio{font-size:12px;color:var(--g500);margin-top:1px;}.log-time{font-size:11px;color:var(--grigio-chiaro);white-space:nowrap;margin-top:2px;}
.tabs{display:flex;border-bottom:2px solid var(--g200);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--g700);}.tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.settings-section h4{font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--g200);}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g100);gap:16px;}.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:600;color:var(--navy);}.setting-desc{font-size:12px;color:var(--g500);margin-top:2px;}
.key-input{font-family:monospace;font-size:12px;width:220px;background:var(--g50);}.key-input.saved{border-color:var(--verde);background:#EEF5E3;}
.info-box{background:var(--blue-xlight);border:1px solid var(--blue-light);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--navy);margin-bottom:16px;}
.warn-box{background:var(--orange-light);border:1px solid #f5c28a;border-radius:var(--r);padding:14px 16px;font-size:13px;color:#7a3800;margin-bottom:16px;}
.empty{text-align:center;padding:48px 20px;color:var(--g500);}.empty .ei{font-size:36px;margin-bottom:12px;}.empty p{font-size:14px;font-weight:500;}.empty small{font-size:12px;color:var(--g300);display:block;margin-top:6px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--g200);border-top-color:var(--verde);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.nota{font-size:11px;color:var(--g500);font-style:italic;}
.tpl-card{border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:12px;background:#fff;}
.tpl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tpl-nome{font-size:14px;font-weight:700;color:var(--navy);}.tpl-tipo{font-size:11px;background:var(--g100);padding:2px 8px;border-radius:20px;color:var(--g500);font-weight:600;}
.tpl-preview{font-size:12px;color:var(--g700);line-height:1.6;max-height:60px;overflow:hidden;white-space:pre-wrap;}
.sede-card{border:1px solid var(--g200);border-radius:var(--r);padding:16px 20px;background:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;box-shadow:var(--sh-sm);}
.sede-nome{font-size:15px;font-weight:700;color:var(--navy);}.sede-addr{font-size:12px;color:var(--g500);margin-top:2px;}
.campagna-card{border:1px solid var(--g200);border-radius:var(--r);padding:14px 18px;background:#fff;margin-bottom:10px;box-shadow:var(--sh-sm);}
.campagna-nome{font-size:14px;font-weight:700;color:var(--navy);}.campagna-sub{font-size:12px;color:var(--g500);margin-top:3px;}.campagna-active{border-left:3px solid var(--verde);}
@media(max-width:768px){main#main{padding:16px;}.frow{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="toast"></div>
<div id="lp">
  <div class="lcard">
    <div id="login-logo"></div>
    <h2>Accedi</h2><p>Inserisci le tue credenziali Medical Group.</p>
    <div id="lerr" class="lerr"></div>
    <div class="lfield"><label>Email</label><input type="text" id="lemail" placeholder="nome@medicalgroup.it" autocomplete="username"/></div>
    <div class="lfield"><label>Password</label><input type="password" id="lpwd" placeholder="password" autocomplete="current-password"/></div>
    <button class="lbtn" id="lbtn-login">Accedi</button>
  </div>
</div>
<div id="app">
  <div id="topbar">
    <div id="tb-top">
      <div id="tb-logo"></div>
      <div id="tb-right"><span id="tb-date"></span><span id="tb-user"></span><span id="tb-role"></span><button id="lout">Esci</button></div>
    </div>
    <nav id="tb-nav">
      <button class="tnb active" data-page="prospect">Prospect</button>
      <button class="tnb" data-page="email">Email <span class="badge" id="badge-email" style="display:none"></span></button>
      <button class="tnb" data-page="followup">Follow-up <span class="badge" id="badge-followup" style="display:none"></span></button>
      <button class="tnb" data-page="pipeline">Pipeline</button>
      <button class="tnb" data-page="template">Template</button>
      <button class="tnb" data-page="campagne">Campagne</button>
      <button class="tnb" data-page="log">Log</button>
      <button class="tnb" data-page="settings">Impostazioni</button>
    </nav>
  </div>
  <div id="campagna-bar"><label>Campagna:</label><select id="campagna-sel"></select><span id="campagna-badge"></span></div>
  <main id="main"><div id="pb"></div></main>
</div>
<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-head"><h3 id="modal-title"></h3><button class="modal-close" id="modal-close-btn">x</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>
<script>
const CFG={URL:'https://iczsdqcnvauopwkuspti.supabase.co',KEY:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljenNkcWNudmF1b3B3a3VzcHRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTQ0MjMsImV4cCI6MjA5MjQzMDQyM30.SmcRHPLM2PEq4Hn-5CQhMyQKoz0PN_0lbN_X3l9MNUE',FN:'https://iczsdqcnvauopwkuspti.supabase.co/functions/v1'};
const T=n=>`sp_${n}`;
const S={user:null,token:null,ruolo:null,page:'prospect',prospect:[],email:[],log:[],template:[],sedi:[],campagne:[],filtri:{stato:'',sport:'',search:''},selezionati:new Set(),settings:{},campagnaAttiva:null};
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmt(d){if(!d)return'\u2014';const dt=typeof d==='string'?new Date(d.length===10?d+'T00:00:00':d):d;return dt.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDT(d){if(!d)return'\u2014';return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
let _tid;
function toast(msg,type='ok'){const el=$('toast');clearTimeout(_tid);el.textContent=msg;el.className=`show t${type}`;_tid=setTimeout(()=>el.className='',3500);}
async function db(method,table,opts={}){
  const{flt='',body=null,sel='*',ord='',lim=''}=opts;
  let url=`${CFG.URL}/rest/v1/${table}?select=${sel}`;
  if(flt)url+=`&${flt}`;if(ord)url+=`&order=${ord}`;if(lim)url+=`&limit=${lim}`;
  const headers={'apikey':CFG.KEY,'Authorization':`Bearer ${S.token||CFG.KEY}`,'Content-Type':'application/json','Prefer':method==='POST'?'return=representation':''};
  const res=await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){const e=await res.text();throw new Error(`${method} ${table}: ${e}`);}
  return method==='DELETE'?null:res.json();
}
async function supaAuth(email,pwd){
  const res=await fetch(`${CFG.URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{'apikey':CFG.KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});
  return res.json();
}
async function doLogin(){
  const email=$('lemail').value.trim(),pwd=$('lpwd').value;
  const err=$('lerr');err.style.display='none';
  if(!email||!pwd){err.textContent='Inserisci email e password.';err.style.display='block';return;}
  const btn=$('lbtn-login');btn.textContent='Accesso...';btn.disabled=true;
  try{
    const data=await supaAuth(email,pwd);
    if(data.error){err.textContent=data.error_description||data.error;err.style.display='block';return;}
    S.token=data.access_token;S.user={email:data.user.email,id:data.user.id};
    try{const p=await db('GET',T('profili'),{flt:`id=eq.${data.user.id}`});if(p&&p.length){S.ruolo=p[0].ruolo;S.user.nome=p[0].nome;S.user.cognome=p[0].cognome;}else{S.ruolo='viewer';S.user.nome=email.split('@')[0];S.user.cognome='';}}catch(e){S.ruolo='viewer';}
    await initApp();
  }catch(e){err.textContent='Errore di connessione.';err.style.display='block';}
  finally{btn.textContent='Accedi';btn.disabled=false;}
}
function doLogout(){S.user=null;S.token=null;S.ruolo=null;S.campagnaAttiva=null;$('app').style.display='none';$('lp').style.display='flex';$('lemail').value='';$('lpwd').value='';}
function logoSVG(small){const w=small?28:36,h=small?22:28;return`<svg width="${w}" height="${h}" viewBox="0 0 90 70" fill="none"><circle cx="28" cy="22" r="19" stroke="#D5E3B7" stroke-width="3.5" fill="none"/><circle cx="40" cy="38" r="24" stroke="#77797A" stroke-width="3.5" fill="none"/></svg>`;}
function logoHTML(small=false){return`<div style="display:flex;align-items:center;gap:${small?6:10}px;">${logoSVG(small)}<div style="line-height:1.15;"><div style="font-weight:300;font-size:${small?11:14}px;letter-spacing:4px;text-transform:uppercase;"><span style="color:var(--grigio);">MEDICAL</span><span style="color:var(--verde);">GROUP</span></div><div style="font-size:9px;letter-spacing:2px;color:var(--grigio-chiaro);text-transform:uppercase;font-weight:500;">Prospect Sport</div></div></div>`;}
async function initApp(){
  $('lp').style.display='none';$('app').style.display='flex';
  $('tb-date').textContent=new Date().toLocaleDateString('it-IT',{weekday:'short',day:'2-digit',month:'long'});
  $('tb-user').textContent=`${S.user.nome||''} ${S.user.cognome||''}`.trim()||S.user.email;
  $('tb-role').textContent=S.ruolo||'viewer';
  document.querySelectorAll('.tnb').forEach(b=>b.addEventListener('click',()=>goPage(b.dataset.page)));
  $('lout').addEventListener('click',doLogout);
  await loadAll();buildCampagnaBar();goPage('prospect');updateBadges();
}
async function loadAll(){
  try{
    [S.prospect,S.email,S.log,S.template,S.sedi,S.campagne]=await Promise.all([
      db('GET',T('prospect'),{ord:'created_at.desc'}).catch(()=>[]),
      db('GET',T('email'),{ord:'created_at.desc'}).catch(()=>[]),
      db('GET',T('log'),{ord:'created_at.desc',lim:'200'}).catch(()=>[]),
      db('GET',T('template'),{ord:'created_at.asc'}).catch(()=>[]),
      db('GET',T('sedi'),{ord:'nome.asc'}).catch(()=>[]),
      db('GET',T('campagne'),{ord:'created_at.desc'}).catch(()=>[]),
    ]);
    try{const sv=await db('GET',T('settings'),{});S.settings={};(sv||[]).forEach(r=>{S.settings[r.chiave]=r.valore;});}catch(e){}
  }catch(e){toast('Errore caricamento dati','err');}
}
function buildCampagnaBar(){
  const sel=$('campagna-sel');
  sel.innerHTML='<option value="">Tutte le campagne</option>'+S.campagne.map(c=>{const sede=S.sedi.find(s=>s.id===c.sede_id);return`<option value="${c.id}" ${S.campagnaAttiva===c.id?'selected':''}>${esc(c.nome)}${sede?' - '+esc(sede.citta):''}${c.attiva?'':' (archiviata)'}</option>`;}).join('');
  sel.addEventListener('change',e=>{S.campagnaAttiva=e.target.value||null;aggiornaDescrizioneCampagna();goPage(S.page);});
  aggiornaDescrizioneCampagna();
}
function aggiornaDescrizioneCampagna(){
  const badge=$('campagna-badge');
  if(!S.campagnaAttiva){badge.textContent=`${S.prospect.length} prospect totali`;return;}
  const c=S.campagne.find(x=>x.id===S.campagnaAttiva);const sede=c?S.sedi.find(s=>s.id===c.sede_id):null;
  const n=S.prospect.filter(p=>p.campagna_id===S.campagnaAttiva).length;
  badge.textContent=`${sede?sede.nome+' - ':''} raggio ${c?c.raggio_km:30}km - ${n} prospect`;
}
function prospectFiltrati(){
  return S.prospect.filter(p=>{
    if(S.campagnaAttiva&&p.campagna_id!==S.campagnaAttiva)return false;
    if(S.filtri.stato&&p.stato!==S.filtri.stato)return false;
    if(S.filtri.sport&&!(p.sport||'').toLowerCase().includes(S.filtri.sport.toLowerCase()))return false;
    if(S.filtri.search){const q=S.filtri.search.toLowerCase();if(!(p.nome||'').toLowerCase().includes(q)&&!(p.citta||'').toLowerCase().includes(q))return false;}
    return true;
  });
}
function updateBadges(){
  const daApp=S.prospect.filter(p=>p.stato==='email_trovata'&&p.email&&(!S.campagnaAttiva||p.campagna_id===S.campagnaAttiva)).length;
  const bE=$('badge-email');if(daApp>0){bE.textContent=daApp;bE.style.display='inline';}else bE.style.display='none';
  const daFu=prospectDaFollowup().length;
  const bF=$('badge-followup');if(daFu>0){bF.textContent=daFu;bF.style.display='inline';}else bF.style.display='none';
}
function prospectDaFollowup(){
  const giorni=parseInt(S.settings['followup_days']||'4');
  const soglia=new Date();soglia.setDate(soglia.getDate()-giorni);
  return S.prospect.filter(p=>{
    if(p.stato!=='contattato')return false;
    if(S.campagnaAttiva&&p.campagna_id!==S.campagnaAttiva)return false;
    const last=S.email.filter(e=>e.prospect_id===p.id).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    return last&&new Date(last.created_at)<soglia;
  });
}
function goPage(pg){
  S.page=pg;
  document.querySelectorAll('.tnb').forEach(b=>b.classList.toggle('active',b.dataset.page===pg));
  const pb=$('pb');
  if(pg==='prospect')renderProspect(pb);
  else if(pg==='email')renderEmail(pb);
  else if(pg==='followup')renderFollowup(pb);
  else if(pg==='pipeline')renderPipeline(pb);
  else if(pg==='template')renderTemplate(pb);
  else if(pg==='campagne')renderCampagne(pb);
  else if(pg==='log')renderLog(pb);
  else if(pg==='settings')renderSettings(pb);
}
function statoBadge(stato){const L={nuovo:'Nuovo',email_trovata:'Email trovata',contattato:'Contattato',risposto:'Risposto',call:'Call schedulata',cliente:'Cliente',no:'Non interessato'};return`<span class="badge-stato s-${stato}"><span class="dot dot-${stato}"></span>${L[stato]||stato}</span>`;}

async function lanciaHunter(){

  if(!S.settings['hunter_key']){toast('Configura Hunter.io API Key nelle Impostazioni','warn');return;}

  $('modal-body').innerHTML=`<div class="info-box">Verranno usate <strong>${ids.length}/25 ricerche</strong> Hunter.io mensili per i seguenti prospect:</div>
    <div style="max-height:200px;overflow-y:auto;margin-bottom:12px;">
      ${list.map(p=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--g100);font-size:13px;"><span style="font-weight:600;">${esc(p.nome)}</span><span style="font-size:12px;color:var(--g500);">${esc(p.sito_web||'sito non disponibile')}</span></div>`).join('')}

  $('modal-foot').innerHTML='<button class="btn btn-secondary" id="hn-c">Annulla</button><button class="btn btn-primary" id="hn-a">Avvia ricerca</button>';
  $('hn-c').addEventListener('click',closeModal);
  $('hn-a').addEventListener('click',async()=>{
    $('hn-a').disabled=true;$('hn-a').textContent='Ricerca...';
    let ok=0,skip=0;
    for(const p of list){
      if(!p.sito_web){skip++;continue;}
      try{
        const domain=p.sito_web.replace(/https?:\/\//,'').replace(/\/.*/,'');
        const res=await fetch(`https://api.hunter.io/v2/domain-search?domain=${domain}&api_key=${S.settings['hunter_key']}`);
        const data=await res.json();
        if(data.data?.emails?.length>0){
          await db('PATCH',T('prospect'),{flt:`id=eq.${p.id}`,body:{email:data.data.emails[0].value,email_verificata:true,stato:'email_trovata',updated_at:new Date().toISOString()}});ok++;
        }else skip++;
      }catch(e){skip++;}
    }

  });
  openModal();
}

async function inviaEmail(prospectId,oggetto,testo,tipo){

    ${S.ruolo==='admin'?`<div style="display:flex;gap:6px;"><button class="btn btn-secondary btn-sm btn-tpl-edit" data-id="${t.id}">Modifica</button><button class="btn btn-danger btn-sm btn-tpl-del" data-id="${t.id}">Elimina</button></div>`:''}
  </div>
  <div style="font-size:12px;color:var(--g500);margin-bottom:6px;"><strong>Oggetto:</strong> ${esc(t.oggetto_default||'\u2014')}</div>
  <div class="tpl-preview">${esc(t.testo||'')}</div>
  </div>`).join('')}`;
  if($('btn-tpl-new'))$('btn-tpl-new').addEventListener('click',()=>openEditTemplate(null));
  if($('btn-tpl-ai'))$('btn-tpl-ai').addEventListener('click',openGeneraTemplate);

  document.querySelectorAll('.btn-tpl-del').forEach(b=>b.addEventListener('click',()=>eliminaTemplate(b.dataset.id)));
}
function openEditTemplate(id){

  $('modal-title').textContent=t?'Modifica template':'Nuovo template';$('modal-box').className='modal modal-lg';
  $('modal-body').innerHTML=`
    <div class="frow"><div class="fgroup"><label>Nome *</label><input type="text" id="te-nome" value="${esc(t?.nome||'')}"/></div>
    <div class="fgroup"><label>Tipo</label><select id="te-tipo"><option value="primo_contatto" ${t?.tipo==='primo_contatto'?'selected':''}>Primo contatto</option><option value="followup_1" ${t?.tipo==='followup_1'?'selected':''}>Follow-up 1</option><option value="followup_2" ${t?.tipo==='followup_2'?'selected':''}>Follow-up 2</option></select></div></div>
    <div class="frow"><div class="fgroup"><label>Oggetto default</label><input type="text" id="te-ogg" value="${esc(t?.oggetto_default||'')}"/></div>
    <div class="fgroup"><label>Campagna (vuoto=generico)</label><select id="te-cmp"><option value="">Generico</option>${S.campagne.map(c=>`<option value="${c.id}" ${t?.campagna_id===c.id?'selected':''}>${esc(c.nome)}</option>`).join('')}</select></div></div>
    <div class="frow full"><div class="fgroup"><label>Testo</label>
      <textarea id="te-testo" style="min-height:220px;font-size:13px;line-height:1.7;">${esc(t?.testo||'')}</textarea>
      <span class="nota">Variabili: {{nome}} {{sport}} {{citta}} {{km}} {{sede}}</span>
    </div></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" id="te-c">Annulla</button><button class="btn btn-primary" id="te-s">Salva</button>';
  $('te-c').addEventListener('click',closeModal);
  $('te-s').addEventListener('click',async()=>{
    const nome=$('te-nome').value.trim();if(!nome){toast('Nome obbligatorio','err');return;}
    const body={nome,tipo:$('te-tipo').value,oggetto_default:$('te-ogg').value,testo:$('te-testo').value,campagna_id:$('te-cmp').value||null,updated_at:new Date().toISOString()};
    try{
      if(t)await db('PATCH',T('template'),{flt:`id=eq.${t.id}`,body});
      else{body.created_at=new Date().toISOString();await db('POST',T('template'),{body});}
      await loadAll();toast(t?'Aggiornato':'Creato');closeModal();goPage('template');
    }catch(e){toast('Errore: '+e.message,'err');}
  });

}
function openGeneraTemplate(){
  if(!S.settings['claude_key']){toast('Configura Claude API Key','warn');return;}
  $('modal-title').textContent='Genera template con AI';$('modal-box').className='modal modal-lg';
  $('modal-body').innerHTML=`
    <div class="frow"><div class="fgroup"><label>Tipo</label><select id="gt-tipo"><option value="primo_contatto">Primo contatto</option><option value="followup_1">Follow-up 1</option><option value="followup_2">Follow-up 2</option></select></div>
    <div class="fgroup"><label>Sport di riferimento</label><input type="text" id="gt-sport" placeholder="calcio giovanile, tennis..."/></div></div>
    <div class="frow full"><div class="fgroup"><label>Istruzioni aggiuntive</label><textarea id="gt-note" style="min-height:60px;"></textarea></div></div>
    <div id="gt-out"></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" id="gt-c">Annulla</button><button class="btn btn-secondary" id="gt-g">Genera</button><button class="btn btn-primary" id="gt-s" style="display:none;">Salva template</button>';
  $('gt-c').addEventListener('click',closeModal);
  $('gt-g').addEventListener('click',async()=>{
    $('gt-g').disabled=true;$('gt-g').textContent='Generazione...';
    try{
      const tipo=$('gt-tipo').value,sport=$('gt-sport').value,note=$('gt-note').value;
      const prompt=`Crea template email per Medi Group per proporre medicina dello sport ad associazioni (${sport||'generico'}). Tipo: ${{primo_contatto:'primo contatto',followup_1:'primo follow-up',followup_2:'secondo follow-up'}[tipo]}. ${note?'Istruzioni: '+note:''} Usa variabili {{nome}} {{sport}} {{citta}} {{km}} {{sede}}. Formato:\nOGGETTO: [oggetto]\n---\n[corpo max 150 parole, in italiano]`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
      const data=await res.json();const testo=data.content?.[0]?.text||'';
      const parts=testo.split('---');const oggetto=(parts[0]||'').replace(/OGGETTO:\s*/i,'').trim();const corpo=(parts[1]||testo).trim();
      $('gt-out').innerHTML=`<div style="margin-top:16px;">
        <div class="fgroup" style="margin-bottom:10px;"><label>Oggetto</label><input type="text" id="gt-ogg-out" value="${esc(oggetto)}" style="width:100%;"/></div>
        <div class="fgroup"><label>Testo</label><textarea id="gt-testo-out" style="min-height:180px;font-size:13px;line-height:1.7;width:100%;">${esc(corpo)}</textarea></div></div>`;
      $('gt-s').style.display='inline-flex';
    }catch(e){toast('Errore AI: '+e.message,'err');}
    $('gt-g').disabled=false;$('gt-g').textContent='Rigenera';
  });
  $('gt-s').addEventListener('click',async()=>{
    const nome=($('gt-sport').value||'Generico')+' - '+{primo_contatto:'Primo contatto',followup_1:'Follow-up 1',followup_2:'Follow-up 2'}[$('gt-tipo').value];
    try{
      await db('POST',T('template'),{body:{nome,tipo:$('gt-tipo').value,oggetto_default:$('gt-ogg-out').value,testo:$('gt-testo-out').value,campagna_id:null,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}});
      await loadAll();toast('Salvato');closeModal();goPage('template');
    }catch(e){toast('Errore','err');}
  });
  openModal();
}
async function eliminaTemplate(id){
  if(!confirm('Eliminare questo template?'))return;
  try{await db('DELETE',T('template'),{flt:`id=eq.${id}`});await loadAll();toast('Eliminato');goPage('template');}catch(e){toast('Errore','err');}
}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

          </div>

  if($('btn-sede-new'))$('btn-sede-new').addEventListener('click',()=>openEditSede(null));

  document.querySelectorAll('.btn-sede-edit').forEach(b=>b.addEventListener('click',()=>openEditSede(b.dataset.id)));
  document.querySelectorAll('.btn-sede-del').forEach(b=>b.addEventListener('click',()=>eliminaSede(b.dataset.id)));
  document.querySelectorAll('.btn-cmp-edit').forEach(b=>b.addEventListener('click',()=>openEditCampagna(b.dataset.id)));
  document.querySelectorAll('.btn-cmp-toggle').forEach(b=>b.addEventListener('click',()=>toggleCampagna(b.dataset.id)));

  $('modal-body').innerHTML=`
    <div class="frow full"><div class="fgroup"><label>Nome *</label><input type="text" id="se-nome" value="${esc(s?.nome||'')}"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Indirizzo</label><input type="text" id="se-ind" value="${esc(s?.indirizzo||'')}"/></div></div>

    <p class="nota" style="margin-top:4px;">Coordinate: su Google Maps cerca l'indirizzo, click destro, "Cosa c'e qui?"</p>`;

  $('se-c').addEventListener('click',closeModal);

    const nome=$('se-nome').value.trim();if(!nome){toast('Nome obbligatorio','err');return;}

      if(s)await db('PATCH',T('sedi'),{flt:`id=eq.${s.id}`,body});

    }catch(e){toast('Errore: '+e.message,'err');}

function openEditCampagna(id){
  const c=id?S.campagne.find(x=>x.id===id):null;
  $('modal-title').textContent=c?'Modifica campagna':'Nuova campagna';$('modal-box').className='modal';
  $('modal-body').innerHTML=`
    <div class="frow full"><div class="fgroup"><label>Nome *</label><input type="text" id="ce-nome" value="${esc(c?.nome||'')}"/></div></div>
    <div class="frow"><div class="fgroup"><label>Sede *</label><select id="ce-sede"><option value="">Seleziona sede</option>${S.sedi.map(s=>`<option value="${s.id}" ${c?.sede_id===s.id?'selected':''}>${esc(s.nome)}</option>`).join('')}</select></div>
    <div class="fgroup"><label>Raggio (km)</label><input type="number" id="ce-raggio" value="${c?.raggio_km||30}" min="5" max="100"/></div></div>
    <div class="frow full"><div class="fgroup"><label>Descrizione</label><textarea id="ce-desc">${esc(c?.descrizione||'')}</textarea></div></div>`;
  $('modal-foot').innerHTML='<button class="btn btn-secondary" id="ce-c">Annulla</button><button class="btn btn-primary" id="ce-s">Salva</button>';

  $('ce-s').addEventListener('click',async()=>{
    const nome=$('ce-nome').value.trim(),sede_id=$('ce-sede').value;

    }catch(e){toast('Errore: '+e.message,'err');}

async function toggleCampagna(id){
  const c=S.campagne.find(x=>x.id===id);if(!c)return;
  try{await db('PATCH',T('campagne'),{flt:`id=eq.${id}`,body:{attiva:!c.attiva,updated_at:new Date().toISOString()}});await loadAll();toast(c.attiva?'Archiviata':'Riattivata');buildCampagnaBar();goPage('campagne');}catch(e){toast('Errore','err');}
}

  if(!confirm('Eliminare questa sede?'))return;
  try{await db('DELETE',T('sedi'),{flt:`id=eq.${id}`});await loadAll();toast('Eliminata');goPage('campagne');}catch(e){toast('Errore','err');}

function renderLog(pb){

function renderSettings(pb){
  pb.innerHTML=`<div class="page-header"><div><div class="page-title">Impostazioni</div><div class="page-subtitle">API key e parametri</div></div></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="card"><div class="settings-section"><h4>API Keys</h4>
      ${renderKey('google_maps_key','Google Maps API Key','Per la ricerca automatica prospect.','AIza...')}
      ${renderKey('hunter_key','Hunter.io API Key','Ricerca email. Piano free: 25/mese.','hunter_...')}
      ${renderKey('claude_key','Anthropic Claude API Key','Generazione email e template AI.','sk-ant-...')}
      ${renderKey('brevo_sender','Email mittente','Es: commerciale@medicalgroup.it','info@medicalgroup.it')}
    </div></div>
    <div>
      <div class="card" style="margin-bottom:16px;"><div class="settings-section"><h4>Parametri</h4>
        <div class="setting-row"><div class="setting-info"><div class="setting-label">Giorni prima follow-up</div><div class="setting-desc">Giorni senza risposta prima che appaia nel follow-up</div></div>
          <select id="set-fu" style="width:90px;">${[3,4,5,7].map(n=>`<option value="${n}" ${(S.settings['followup_days']||'4')===String(n)?'selected':''}>${n} giorni</option>`).join('')}</select>
        </div>
        <div style="margin-top:14px;"><button class="btn btn-primary btn-sm" id="btn-save-cfg">Salva parametri</button></div>
      </div></div>
      <div class="card"><div class="settings-section"><h4>Profilo</h4>
        <div class="setting-row"><div class="setting-label">Email</div><div style="font-size:13px;">${esc(S.user.email)}</div></div>
        <div class="setting-row"><div class="setting-label">Ruolo</div><div>${S.ruolo==='admin'?'<span style="color:var(--verde);font-weight:700;">Admin</span>':'<span style="color:var(--g500);">Viewer</span>'}</div></div>
      </div></div>
      <div class="card" style="margin-top:16px;"><div class="settings-section"><h4>Invio email</h4>
        <p style="font-size:13px;color:var(--g500);line-height:1.6;">L'invio avviene tramite Edge Function <strong>sp-invia-email</strong> su Supabase. La chiave Brevo e configurata come secret Supabase (BREVO_API_KEY).</p>
      </div></div>
    </div>
  </div>`;
  document.querySelectorAll('.key-save-btn').forEach(btn=>btn.addEventListener('click',async()=>{
    const chiave=btn.dataset.key;const input=document.getElementById('k-'+chiave);const valore=input.value.trim();if(!valore)return;
    await saveSettings(chiave,valore);input.classList.add('saved');setTimeout(()=>input.classList.remove('saved'),2000);toast('Salvato');
  }));
  $('btn-save-cfg')&&$('btn-save-cfg').addEventListener('click',async()=>{await saveSettings('followup_days',$('set-fu').value);toast('Parametri salvati');});
}
function renderKey(chiave,label,desc,placeholder){
  const val=S.settings[chiave]||'';
  return`<div class="setting-row"><div class="setting-info"><div class="setting-label">${esc(label)}</div><div class="setting-desc">${esc(desc)}</div></div>
    <div style="display:flex;gap:6px;align-items:center;"><input type="password" class="key-input" id="k-${chiave}" value="${esc(val)}" placeholder="${esc(placeholder)}"/><button class="btn btn-secondary btn-sm key-save-btn" data-key="${chiave}">Salva</button></div>
  </div>`;
}
async function saveSettings(chiave,valore){
  try{
    const ex=await db('GET',T('settings'),{flt:`chiave=eq.${chiave}`});
    if(ex?.length)await db('PATCH',T('settings'),{flt:`chiave=eq.${chiave}`,body:{valore}});
    else await db('POST',T('settings'),{body:{chiave,valore,created_at:new Date().toISOString()}});
    S.settings[chiave]=valore;
  }catch(e){toast('Errore salvataggio','err');}
}
async function addLog(tipo,azione,dettaglio=''){
  try{const r=await db('POST',T('log'),{body:{tipo,azione,dettaglio,created_at:new Date().toISOString()}});if(r?.[0])S.log.unshift(r[0]);}catch(e){}
}
function openModal(){$('modal-overlay').classList.add('open');}
function closeModal(){$('modal-overlay').classList.remove('open');}
document.addEventListener('DOMContentLoaded',()=>{
  const tl=$('tb-logo');if(tl)tl.innerHTML=logoHTML(true);
  const ll=$('login-logo');if(ll)ll.innerHTML=logoHTML(false);
  $('lbtn-login').addEventListener('click',doLogin);
  $('lemail').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  $('lpwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  $('modal-close-btn').addEventListener('click',closeModal);
  $('modal-overlay').addEventListener('click',e=>{if(e.target===$('modal-overlay'))closeModal();});
});
</script>
